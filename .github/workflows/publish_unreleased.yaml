# This workflow publishes the current ADRs from the main branch
# to the 'governance-decisions' folder of the open-education-api.github.io
# repository.

name: Publish ADRs to open-education-api.github.io

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout this repository containing the ADRs.
      - uses: actions/checkout@v4

      # Generate TOC before publishing.
      - name: Generate TOC
        run: bash ./create_toc adr adr/_sidebar.md

      # Create a GitHub App token used to push to the publication repository.
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            open-education-api.github.io

      # Checkout the publication repository.
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # Sync ADRs from /adr to the publication folder.
      - name: Sync ADRs to governance-decisions
        run: |
          set -euo pipefail
          mkdir -p target/governance/decisions/adr
          mkdir -p target/governance/decisions/_media
          rsync -a --delete adr/ target/governance/decisions/adr/
          rsync -a --delete _media/ target/governance/decisions/_media/
          rsync -a index.html

      # Commit and push only when the sync introduced changes.
      - name: Commit and push if there are changes
        run: |
          set -euo pipefail
          cd target
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish ADRs -> governance/decisions/adr"
            git push
          else
            echo "No changes to publish."
          fi
