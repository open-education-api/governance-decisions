# This workflow publishes the current ADRs from the main branch
# to the 'governance-decisions' folder of the open-education-api.github.io
# repository.

name: Publish ADRs to open-education-api.github.io

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # 0) Create an installation token for the publishing GitHub App.
      #    This token must be used for ALL pushes (both this repo and the publication repo).
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            governance-decisions
            open-education-api.github.io


      # 1) Checkout this repository.
      #    - fetch-depth: 0 ensures full history.
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      
      # 2) Generate TOC before publishing.
      - name: Generate TOC
        run: bash ./create_toc adr adr/_sidebar.md

      # 3) Add sidebar file
      - name: Commit generated sidebar to main
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add adr/_sidebar.md
            git commit -m "Update sidebar"
            git push
          else
            echo "No changes to publish."
          fi
          
      # 4) Checkout the publication repository.
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # 5) Sync ADRs from /adr to the publication folder.
      - name: Sync ADRs to governance-decisions
        run: |
          set -euo pipefail
          mkdir -p target/governance/decisions/adr
          mkdir -p target/governance/decisions/_media
          rsync -a --delete adr/ target/governance/decisions/adr/
          rsync -a --delete _media/ target/governance/decisions/_media/
          rsync -a index.html target/governance/decisions

      # 6) Commit and push only if there are changes in the publication repo.
      - name: Commit and push publication repo changes (if any)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          cd target
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish ADR documents"
            git push
          else
            echo "No changes to publish."
          fi
